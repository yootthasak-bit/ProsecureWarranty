<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ระบบสร้าง SN และ Barcode สินค้า</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-2: #eef4f6;
      --text: #14212b;
      --muted: #647380;
      --line: #d7e0e7;
      --accent: #0f5f66;
      --accent-2: #c96b3f;
      --ok: #1f8a5b;
      --warn: #b46a00;
      --danger: #b42318;
      --shadow: 0 16px 45px rgba(27, 43, 56, 0.09);
      --radius: 8px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(15, 95, 102, 0.09), transparent 34rem),
        linear-gradient(180deg, #f8fafb 0%, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
    }

    button.secondary {
      background: #e8eef4;
      color: var(--text);
    }

    button.warning {
      background: var(--accent-2);
    }

    button.ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      background: rgba(255, 255, 255, 0.92);
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f5f66, #173f5f);
      color: #fff;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand h1 {
      font-size: 18px;
      line-height: 1.25;
      margin: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    nav {
      display: grid;
      gap: 8px;
    }

    .nav-btn {
      width: 100%;
      justify-content: flex-start;
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
      padding: 11px 12px;
    }

    .nav-btn.active {
      background: #e6f1f2;
      border-color: #bfdde0;
      color: #0a555c;
    }

    main {
      padding: 28px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .topbar p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 25px rgba(31, 48, 69, 0.035);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat strong {
      font-size: 28px;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(310px, 430px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-header h3 {
      margin: 0;
      font-size: 18px;
    }

    .panel-body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #344255;
      font-weight: 700;
      font-size: 13px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 10px 11px;
      outline: none;
      min-height: 40px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #7bbdc3;
      box-shadow: 0 0 0 3px rgba(0, 109, 119, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .sn-preview {
      background: linear-gradient(135deg, #132733, #0f5f66);
      color: #fff;
      padding: 14px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sn-preview strong {
      font-size: clamp(20px, 2.2vw, 28px);
      letter-spacing: 1px;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f2f6fa;
      color: #3d4a5b;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    tbody tr:hover {
      background: #f8fbfd;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.stock { color: #005961; background: #dff2f3; }
    .status.installed { color: #7a3b00; background: #fff0dc; }
    .status.expired { color: #9b1c14; background: #ffe6e3; }
    .status.valid { color: #0f6842; background: #dff3e9; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search {
      min-width: min(100%, 340px);
    }

    .label-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10cm, 1fr));
      gap: 16px;
      justify-items: start;
    }

    .barcode-label {
      background: #fff;
      border: 1px solid #1b2733;
      border-radius: 4px;
      padding: 0.20cm 0.25cm 0.20cm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 10cm;
      height: 5cm;
      box-shadow: 0 10px 28px rgba(31, 48, 69, 0.08);
      position: relative;
      overflow: hidden;
    }
    .label-layout-grid {
      display: flex;
      width: 100%;
      height: 100%;
      justify-content: space-between;
      align-items: stretch;
    }
    .label-left-col {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 7.00cm;
      height: 100%;
      padding-top: 0.16cm;
      padding-bottom: 0.04cm;
    }
    .label-right-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 2.20cm;
      height: 100%;
    }
    .left-code {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .right-code {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .warranty-text {
      font-size: 6.5pt;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.05cm;
      line-height: 1;
      text-align: center;
    }

    .barcode-label:not(.is-selected) {
      opacity: 0.48;
    }

    .label-select {
      position: absolute;
      top: 6px;
      right: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      color: #263747;
      font-size: 12px;
      font-weight: 800;
      z-index: 2;
    }

    .label-select input {
      width: 16px;
      min-height: 16px;
      height: 16px;
      padding: 0;
    }

    .label-info {
      display: grid;
      gap: 0.08cm;
      align-content: start;
    }

    .label-brand {
      display: none;
    }

    .label-title {
      font-weight: 900;
      color: #222f3d;
      font-size: 11pt;
      line-height: 1.05;
      white-space: nowrap;
    }

    .spec-list {
      display: grid;
      gap: 0;
      font-size: 7.10pt;
      line-height: 1.06;
    }

    .spec-row {
      display: grid;
      grid-template-columns: 1.30cm minmax(0, 1fr);
      gap: 0.09cm;
      min-width: 0;
    }

    .spec-row span {
      color: #273746;
      font-weight: 800;
    }

    .spec-row div {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .code-column {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 0.02cm;
    }

    .qr-box {
      width: 2.20cm;
      height: 2.20cm;
      border: 1px solid #111;
      padding: 0.04cm;
      background: #fff;
    }

    .qr-box img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .barcode-label h4 {
      margin: 0;
      font-size: 16px;
      color: #344255;
    }

    .barcode-label .sn {
      font-weight: 900;
      font-size: 10pt;
      line-height: 1;
      letter-spacing: 1px;
      overflow-wrap: anywhere;
      text-align: center;
      grid-column: 1 / -1;
      margin-top: -0.02cm;
    }

    .barcode-label .sn-barcode {
      width: 7.00cm;
      height: 0.42cm;
      grid-column: 1 / -1;
      justify-self: center;
      margin-top: 0.02cm;
    }

    .barcode-label small {
      color: var(--muted);
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .model-list {
      display: grid;
      gap: 10px;
    }

    .model-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f8fafb;
      display: grid;
      gap: 5px;
    }

    .model-item strong {
      font-size: 16px;
    }

    .customer-card {
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    .customer-card .hero {
      background: linear-gradient(135deg, #0f5f66, #173f5f);
      color: #fff;
      padding: 30px;
      display: grid;
      gap: 10px;
    }

    .customer-card .hero h2 {
      margin: 0;
      font-size: 30px;
    }

    .customer-card .hero p {
      margin: 0;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
    }

    .info-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .info-box {
      background: #f8fafb;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 76px;
    }

    body.customer-public .app-shell {
      grid-template-columns: 1fr;
    }

    body.customer-public aside,
    body.customer-public .topbar,
    body.customer-public .stats,
    body.customer-public .no-print {
      display: none !important;
    }

    body.customer-public main {
      min-height: 100vh;
      place-items: center;
      padding: 28px;
    }

    body.customer-public .customer-card {
      box-shadow: 0 22px 65px rgba(27, 43, 56, 0.14);
    }

    body.admin-locked .app-shell {
      grid-template-columns: 1fr;
    }

    body.admin-locked aside,
    body.admin-locked .topbar,
    body.admin-locked .stats {
      display: none !important;
    }

    body.admin-locked main {
      min-height: 100vh;
      place-items: center;
      padding: 28px;
    }

    .info-box span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .info-box strong {
      display: block;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .empty {
      padding: 34px 20px;
      text-align: center;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #101820;
      color: #fff;
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: 0.2s ease;
      max-width: min(440px, calc(100vw - 36px));
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .print-only {
      display: none;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      main {
        padding: 20px;
      }

      .grid, .stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      nav, .form-grid, .info-list {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .sn-preview {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media print {
      @page {
        size: 10cm 5cm;
        margin: 0;
      }

      body {
        background: #fff;
      }

      aside, .topbar, .stats, .grid, .panel:not(.print-panel), .toolbar, .no-print, .toast {
        display: none !important;
      }

      .label-select {
        display: none !important;
      }

      .app-shell, main {
        display: block;
        padding: 0;
      }

      .print-panel {
        border: 0;
        box-shadow: none;
      }

      .print-panel .panel-header {
        display: none;
      }

      .label-grid {
        display: block;
      }

      .barcode-label {
        border: 1px solid #222;
        border-radius: 0;
        box-shadow: none;
        opacity: 1;
        width: 10cm;
        height: 5cm;
        page-break-after: always;
        page-break-inside: avoid;
        break-after: page;
        break-inside: avoid;
      }

      .barcode-label:not(.is-selected) {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside>
      <div class="brand">
        <div class="brand-mark">SN</div>
        <div>
          <h1>ระบบสินค้า</h1>
          <p>Serial number + Barcode</p>
        </div>
      </div>
      <nav aria-label="เมนูหลัก">
        <button class="nav-btn active" data-view="dashboard">ภาพรวม</button>
        <button class="nav-btn" data-view="models">ข้อมูลสินค้า</button>
        <button class="nav-btn" data-view="generate">สร้าง SN</button>
        <button class="nav-btn" data-view="install">บันทึกติดตั้ง</button>
        <button class="nav-btn" data-view="labels">พิมพ์ Barcode</button>
        <button class="nav-btn" data-view="customer">หน้าลูกค้า</button>
        <button class="nav-btn" data-view="data">ข้อมูล SN</button>
      </nav>
    </aside>

    <main>
      <section class="topbar">
        <div>
          <h2 id="pageTitle">ภาพรวมสินค้า</h2>
          <p id="pageIntro">จัดการเลข SN, สต็อก, การติดตั้ง, ลูกค้า และวันหมดประกันในที่เดียว</p>
        </div>
        <div class="actions no-print">
          <button class="secondary" id="seedBtn">เพิ่มข้อมูลตัวอย่าง</button>
          <button class="ghost" id="exportBtn">ส่งออก CSV</button>
        </div>
      </section>

      <section class="stats" id="stats"></section>

      <section id="view-dashboard" class="view"></section>
      <section id="view-models" class="view" hidden></section>
      <section id="view-generate" class="view" hidden></section>
      <section id="view-install" class="view" hidden></section>
      <section id="view-labels" class="view" hidden></section>
      <section id="view-customer" class="view" hidden></section>
      <section id="view-data" class="view" hidden></section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "snBarcodeProducts.v2.empty";
    const MODEL_STORAGE_KEY = "snBarcodeModels.v2.empty";
    const WARRANTY_MONTHS = 12;

    const state = {
      products: [],
      models: [],
      activeView: "dashboard",
      lastGenerated: [],
      selectedLabels: new Set(),
      authenticated: false,
      customerLookup: null,
      lastUpdated: Number(localStorage.getItem("snBarcodeLastUpdated")) || 0
    };

    const titles = {
      dashboard: ["ภาพรวมสินค้า", "จัดการเลข SN, สต็อก, การติดตั้ง, ลูกค้า และวันหมดประกันในที่เดียว"],
      models: ["ข้อมูลสินค้า", "เพิ่มและจัดการรุ่นสินค้า พร้อมรายละเอียดสำหรับพิมพ์ฉลาก"],
      generate: ["สร้างเลข SN", "รูปแบบเลขคือ ปี 4 หลัก + เดือน 2 หลัก + Lot 1 หลัก + ลำดับ 3 หลัก เช่น 2026051001"],
      install: ["บันทึกข้อมูลติดตั้ง", "เลือก SN แล้วใส่สถานที่ติดตั้ง วันที่ติดตั้ง ชื่อลูกค้า และชื่อบริษัท"],
      labels: ["พิมพ์ Barcode", "เลือก SN ที่ต้องการแล้วพิมพ์ฉลากไปติดสินค้า"],
      customer: ["หน้าลูกค้าสแกนดูสินค้า", "เมื่อลูกค้าสแกนบาร์โค้ดหรือกรอก SN จะเห็นข้อมูลติดตั้งและประกัน"],
      data: ["ข้อมูล SN", "ค้นหา แก้ไข และตรวจสอบสถานะ SN ทั้งหมด"]
    };

    const el = {
      stats: document.getElementById("stats"),
      pageTitle: document.getElementById("pageTitle"),
      pageIntro: document.getElementById("pageIntro"),
      toast: document.getElementById("toast")
    };

    document.querySelectorAll(".nav-btn").forEach((btn) => {
      btn.addEventListener("click", () => setView(btn.dataset.view));
    });

    document.getElementById("seedBtn").addEventListener("click", seedData);
    document.getElementById("exportBtn").addEventListener("click", exportCsv);

    window.addEventListener("popstate", () => {
      const params = new URLSearchParams(location.search);
      const sn = params.get("sn");
      if (sn && !isAdminPath()) setView("customer");
      if (!sn) init();
    });

    init();

    async function init() {
      const params = new URLSearchParams(location.search);
      const customerSn = params.get("sn") || "";
      if (customerSn && !isAdminPath()) {
        state.activeView = "customer";
        document.body.classList.add("customer-public");
        await loadCustomerProduct(customerSn);
        renderAll();
        setView("customer", false);
        return;
      }

      state.authenticated = await checkAdminSession();
      if (!state.authenticated) {
        renderAdminLogin();
        return;
      }

      document.body.classList.remove("admin-locked");
      // First populate state from local storage before syncing
      state.products = loadProducts();
      state.models = loadModels();
      
      await syncFromServer();
      
      state.activeView = "dashboard";
      document.body.classList.remove("customer-public");
      renderAll();
      setView(state.activeView, false);
    }

    function isAdminPath() {
      const path = location.pathname.replace(/\/+$/, "") || "/";
      return path === "/admin";
    }

    async function checkAdminSession() {
      if (!serverMode()) return false;
      try {
        const response = await fetch("/api/session", { cache: "no-store" });
        const data = await response.json();
        return Boolean(data.authenticated);
      } catch {
        return false;
      }
    }

    function renderAdminLogin() {
      document.body.classList.add("admin-locked");

    async function loadCustomerProduct(sn) {
      state.customerLookup = null;
      if (!sn || !serverMode()) return;
      try {
        const response = await fetch(`/api/customer?sn=${encodeURIComponent(sn)}`, { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot load customer data");
        const data = await response.json();
        state.customerLookup = data.product || null;
      } catch (error) {
        console.warn(error);
      }
    }

    function serverMode() {
      return location.protocol === "http:" || location.protocol === "https:";
    }

    async function syncFromServer() {
      if (!serverMode()) return;
      try {
        const response = await fetch("/api/data", { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot load server data");
        const data = await response.json();
        
        const localLastUpdated = Number(localStorage.getItem("snBarcodeLastUpdated")) || 0;
        const serverLastUpdated = Number(data.lastUpdated) || 0;
        
        if (serverLastUpdated > localLastUpdated) {
          // Server data is newer
          state.products = Array.isArray(data.products) ? data.products : [];
          state.models = Array.isArray(data.models) ? data.models : [];
          state.lastUpdated = serverLastUpdated;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.products));
          localStorage.setItem(MODEL_STORAGE_KEY, JSON.stringify(state.models));
          localStorage.setItem("snBarcodeLastUpdated", state.lastUpdated);
        } else if (localLastUpdated > serverLastUpdated) {
          // Local data is newer, upload to server
          state.lastUpdated = localLastUpdated;
          await saveServerData();
        } else {
          // Equal, just make sure state matches load
          state.products = loadProducts();
          state.models = loadModels();
          state.lastUpdated = localLastUpdated;
        }
      } catch (error) {
        console.warn(error);
        showToast("เชื่อมต่อข้อมูลกลางไม่ได้ ระบบจะแสดงข้อมูลในเครื่องนี้");
        state.products = loadProducts();
        state.models = loadModels();
      }
    }

    function loadProducts() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function loadModels() {
      try {
        return JSON.parse(localStorage.getItem(MODEL_STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveProducts() {
      state.lastUpdated = Date.now();
      localStorage.setItem("snBarcodeLastUpdated", state.lastUpdated);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.products));
      saveServerData();
    }

    function saveModels() {
      state.lastUpdated = Date.now();
      localStorage.setItem("snBarcodeLastUpdated", state.lastUpdated);
      localStorage.setItem(MODEL_STORAGE_KEY, JSON.stringify(state.models));
      saveServerData();
    }

    async function saveServerData() {
      if (!serverMode()) return;
      try {
        await fetch("/api/data", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            products: state.products, 
            models: state.models, 
            lastUpdated: state.lastUpdated 
          })
        });
      } catch (error) {
        console.warn(error);
        showToast("บันทึกข้อมูลกลางไม่ได้ กรุณาตรวจสอบเซิร์ฟเวอร์");
      }
    }

    function createManualSn(event) {
      event.preventDefault();
      const snInput = document.getElementById("manualSn").value.trim().toUpperCase();

      if (state.products.some(p => p.sn === snInput)) { showToast("SN นี้มีอยู่แล้ว"); return; }
      
      const match = snInput.match(/^([A-Z0-9]+?)(\d{10})$/);
      if (!match) { showToast("รูปแบบ SN ไม่ถูกต้อง (รหัสรุ่น + ตัวเลข 10 หลัก)"); return; }
      
      const prefix = match[1];
      const core = match[2];
      const year = core.slice(0, 4);
      const month = core.slice(4, 6);
      const lot = core.slice(6, 7);
      const sequence = Number(core.slice(7));
      
      const model = state.models.find(m => serialPrefix(m.model) === prefix);
      if (!model) { showToast(`ไม่พบรุ่นสินค้าที่มี Prefix ตรงกับ "${prefix}" ในระบบ`); return; }
      
      state.products.push({
        sn: snInput,
        year,
        month,
        lot,
        sequence,
        serialCore: core,
        productPrefix: prefix,
        modelId: model.id,
        productName: model.model,

        status: "stock",

        companyName: "",
        installLocation: "",
        installDate: "",
        warrantyStart: "",
        warrantyEnd: "",
        note: "",
        createdAt: new Date().toISOString()
      });
      
      saveProducts();
      renderAll();
      showToast(`สร้าง SN ${snInput} สำเร็จ`);
    }

    function createSerials(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const year = digits(form.elements.year.value, 4);
      const month = digits(form.elements.month.value, 2);
      const lot = digits(form.elements.lot.value, 1);
      const qty = Number(form.elements.qty.value);
      const selectedModel = state.models.find((item) => item.id === form.elements.modelId.value);
      const productName = selectedModel?.model || "";
      const productPrefix = serialPrefix(productName);

      if (!/^\d{4}$/.test(year) || !/^\d{2}$/.test(month) || Number(month) < 1 || Number(month) > 12 || !/^\d$/.test(lot)) {
        showToast("กรุณาตรวจสอบปี เดือน และ Lot");
        return;
      }

      if (!productPrefix) {
        showToast("กรุณาเลือกรุ่นสินค้า");
        return;
      }

      const created = [];
      let sequence = nextSequence(year, month, lot, productPrefix);
      for (let i = 0; i < qty; i += 1) {
        const serialCore = `${year}${month}${lot}${String(sequence).padStart(3, "0")}`;
        const sn = `${productPrefix}${serialCore}`;
        if (state.products.some((p) => p.sn === sn)) {
          sequence += 1;
          i -= 1;
          continue;
        }
        created.push(sn);
        state.products.push({
          sn,
          year,
          month,
          lot,
          sequence,
          serialCore,
          productPrefix,
          modelId: selectedModel.id,
          productName,
          material: selectedModel.material,
          size: selectedModel.size,
          voltage: selectedModel.voltage,
          status: "stock",
          customerName: "",
          companyName: "",
          installLocation: "",
          installDate: "",
          warrantyStart: "",
          warrantyEnd: "",
          note: "",
          createdAt: new Date().toISOString()
        });
        sequence += 1;
      }
      state.lastGenerated = created;
      saveProducts();
      renderAll();
      showToast(`สร้าง SN สำเร็จ ${created.length} รายการ`);
    }

    function installProduct(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const product = state.products.find((p) => p.sn === form.elements.installSn.value);
      if (!product) {
        showToast("ไม่พบเลข SN นี้");
        return;
      }
      const installDate = form.elements.installDate.value;
      product.status = "installed";
      product.customerName = form.elements.customerName.value.trim();
      product.companyName = form.elements.companyName.value.trim();
      product.customerType = form.elements.customerType.value;
      product.installLocation = form.elements.installLocation.value.trim();
      product.installDate = installDate;
      product.warrantyStart = installDate;

    function nextSn(productName, year, month, lot) {
      const y = digits(year, 4) || "0000";
      const m = digits(month, 2) || "00";
      const l = digits(lot, 1) || "0";
      const prefix = serialPrefix(productName);
      return `${prefix}${y}${m}${l}${String(nextSequence(y, m, l, prefix)).padStart(3, "0")}`;
    }

    function nextSequence(year, month, lot, productPrefix = "") {
      const max = state.products
        .filter((p) => p.year === year && p.month === month && p.lot === lot && (!productPrefix || (p.productPrefix || serialPrefix(p.productName)) === productPrefix))
        .reduce((highest, p) => Math.max(highest, Number(p.sequence) || 0), 0);
      return max + 1;
    }

    function digits(value, length) {
      return String(value || "").replace(/\D/g, "").slice(0, length).padStart(length, "0");
    }

    function serialPrefix(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
    }

    function serialCoreFromSn(sn) {
      const digitsOnly = String(sn || "").replace(/\D/g, "");
      return digitsOnly.slice(-10);
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function addMonths(dateString, months) {
      const date = new Date(`${dateString}T00:00:00`);
      date.setMonth(date.getMonth() + months);
      return date.toISOString().slice(0, 10);
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("th-TH", { year: "numeric", month: "short", day: "numeric" }).format(new Date(`${value}T00:00:00`));
    }

    function daysBetween(a, b) {
      return Math.ceil((b.setHours(0,0,0,0) - a.setHours(0,0,0,0)) / 86400000);
    }

    function warrantyStatus(product) {
      if (product.status !== "installed" || !product.warrantyEnd) return { label: "ยังไม่เริ่ม", className: "stock" };
      const left = daysBetween(new Date(), new Date(product.warrantyEnd));
      if (left < 0) return { label: "หมดประกัน", className: "expired" };
      return { label: `เหลือ ${left} วัน`, className: "valid" };
    }

    function stockByProduct(productName) {
      return state.products.filter((p) => p.productName === productName && p.status !== "installed").length;
    }

    function productSpec(product) {
      const model = state.models.find((item) => item.id === product.modelId || item.model === product.productName);
      return {
        model: product.productName || model?.model || "-",
        material: product.material || model?.material || "-",
        size: product.size || model?.size || "-",
        voltage: product.voltage || model?.voltage || "-"
      };
    }

    function customerUrl(sn) {
      const url = new URL("/", location.origin);
      url.searchParams.set("sn", sn);
      return url.toString();
    }

    function customerPortalUrl() {
      return new URL("/", location.origin).toString();
    }

    function qrImageUrl(text) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=8&data=${encodeURIComponent(text)}`;
    }

    function barcodeSvg(text) {
      const bars = code128B(text);
      let x = 0;
      const height = 54;
      const module = 1.55;
      const rects = [];
      bars.forEach((width, index) => {
        if (index % 2 === 0) {
          rects.push(`<rect x="${(x * module).toFixed(2)}" y="0" width="${(width * module).toFixed(2)}" height="${height}" />`);
        }
        x += width;
      });
      return `<svg class="sn-barcode" viewBox="0 0 ${(x * module).toFixed(2)} ${height}" role="img" aria-label="barcode"><rect width="100%" height="100%" fill="#fff" />${rects.join("")}</svg>`;
    }

    function code128B(text) {
      const patterns = [
        "212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"
      ];
      const values = [104];
      for (const char of text) {
        const code = char.charCodeAt(0);
        values.push(code >= 32 && code <= 126 ? code - 32 : 0);
      }
      let checksum = values[0];
      for (let i = 1; i < values.length; i += 1) checksum += values[i] * i;
      values.push(checksum % 103, 106);
      return values.flatMap((value) => patterns[value].split("").map(Number));
    }

    function exportCsv() {
      if (!state.products.length) {
        showToast("ยังไม่มีข้อมูลสำหรับส่งออก");
        return;
      }
      const headers = ["SN","Product","Status","Customer","Company","Location","InstallDate","WarrantyEnd","CreatedAt"];
      const rows = state.products.map((p) => [p.sn, p.productName, p.status, p.customerName, p.companyName, p.installLocation, p.installDate, p.warrantyEnd, p.createdAt]);
      const csv = [headers, ...rows].map((row) => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `sn-products-${today()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      return `"${String(value || "").replace(/"/g, '""')}"`;
    }

      saveProducts();
      renderAll();
      showToast("เพิ่มข้อมูลตัวอย่างแล้ว");
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 2400);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
